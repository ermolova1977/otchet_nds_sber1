<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Отчёт собственнику: эффект возврата авансов и экономия НДС</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>

    /* УВЕЛИЧЕНИЕ ШРИФТОВ НА ~1.8x */
    :root {
      --font-xxs: 20px;
      --font-xs: 22px;
      --font-sm: 24px;
      --font-md: 26px;
      --font-lg: 32px;
      --font-xl: 40px;
      --font-xxl: 50px;

      --bg-dark: #050816;
      --bg-card: #0f172a;
      --bg-card-soft: #111827;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.2);
      --accent-red: #ef4444;
      --accent-red-soft: rgba(239, 68, 68, 0.12);
      --accent-yellow: #facc15;
      --text-main: #e5e7eb;
      --text-soft: #9ca3af;
      --border-soft: rgba(148, 163, 184, 0.4);
      --shadow-strong: 0 24px 60px rgba(15,23,42,0.85);
      --shadow-soft: 0 18px 40px rgba(15,23,42,0.6);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px 12px 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(59,130,246,0.25), transparent 55%),
        radial-gradient(circle at 100% 0%, rgba(236,72,153,0.25), transparent 55%),
        radial-gradient(circle at 50% 100%, rgba(34,197,94,0.16), transparent 55%),
        var(--bg-dark);
      color: var(--text-main);
      font-size: var(--font-md);
    }

    .page { max-width: 1120px; margin: 0 auto; }

    /* HEADER */
    .header {
      display: grid;
      grid-template-columns: minmax(0, 2.4fr) minmax(0, 1.6fr);
      gap: 24px;
      align-items: center;
      margin-bottom: 32px;
    }

    .title-block {
      background: linear-gradient(135deg, rgba(15,23,42,0.96), rgba(15,23,42,0.85));
      border-radius: var(--radius-xl);
      padding: 22px 26px 24px;
      box-shadow: var(--shadow-strong);
      border: 1px solid rgba(148,163,184,0.5);
      position: relative;
      overflow: hidden;
    }

    .title-block::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 0 0, rgba(34,197,94,0.16), transparent 65%),
        radial-gradient(circle at 100% 0, rgba(59,130,246,0.16), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(148,163,184,0.6);
      color: var(--text-soft);
      font-size: var(--font-xs);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .pill-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 10px rgba(34,197,94,0.3);
    }

    h1 {
      margin: 0 0 12px;
      font-size: var(--font-xxl);
      line-height: 1.25;
    }

    .subtitle {
      margin: 0;
      font-size: var(--font-sm);
      color: var(--text-soft);
      max-width: 90%;
    }

    .tagline {
      margin-top: 18px;
      font-size: var(--font-sm);
      color: var(--accent);
      font-weight: 600;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      margin-top: 18px;
      font-size: var(--font-xs);
      color: var(--text-soft);
    }

    .meta span {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(55,65,81,0.8);
    }

    .meta-label {
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(156,163,175,0.85);
    }

    /* HERO CARD */
    .hero-number-card {
      background: radial-gradient(circle at 0 0, rgba(34,197,94,0.24), transparent 60%),
                  radial-gradient(circle at 100% 100%, rgba(234,179,8,0.14), transparent 60%),
                  var(--bg-card-soft);
      border-radius: var(--radius-xl);
      padding: 24px;
      border: 1px solid rgba(55,65,81,0.9);
      box-shadow: var(--shadow-soft);
    }

    .hero-label {
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 14px;
    }

    .hero-number {
      font-size: var(--font-xl);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .hero-caption {
      font-size: var(--font-sm);
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(15,23,42,0.9);
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      font-size: var(--font-xs);
      margin-bottom: 14px;
    }

    .impact-bar-label {
      font-size: var(--font-xs);
      color: var(--text-soft);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .impact-bar-track {
      height: 12px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      overflow: hidden;
      border: 1px solid rgba(55,65,81,0.95);
    }

    .impact-bar-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a3e635);
    }

    .hero-footnote {
      margin-top: 12px;
      font-size: var(--font-xs);
      color: var(--text-soft);
    }

    /* LAYOUT */
    main {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1.3fr);
      gap: 22px;
    }

    .card {
      background: rgba(15,23,42,0.96);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(55,65,81,0.95);
      padding: 22px;
      box-shadow: var(--shadow-soft);
    }

    .card-title {
      font-size: var(--font-lg);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-subtitle {
      font-size: var(--font-sm);
      color: var(--text-soft);
      margin-top: 6px;
    }

    /* KPI GRID */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .kpi-label { font-size: var(--font-sm); color: var(--text-soft); }
    .kpi-value { font-size: var(--font-lg); font-weight: 600; margin-top: 4px; }
    .kpi-tag { font-size: var(--font-xs); color: var(--accent); margin-top: 6px; }
    .kpi-note { font-size: var(--font-xs); color: var(--text-soft); margin-top: 6px; }

    /* SCENARIOS */
    .scenario-title {
      font-size: var(--font-lg);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .scenario ul {
      font-size: var(--font-sm);
      padding-left: 22px;
    }

    .scenario-footnote {
      font-size: var(--font-xs);
      color: var(--text-soft);
      margin-top: 10px;
    }

    /* FLAGS */
    .flag-title { font-size: var(--font-md); font-weight: 600; margin-bottom: 4px; }
    .flag-text { font-size: var(--font-sm); color: var(--text-soft); }
    .list { font-size: var(--font-sm); }

    /* QUOTES */
    .quote {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(75,85,99,0.9);
      background: rgba(15,23,42,0.96);
      font-size: var(--font-sm);
      color: var(--text-soft);
    }

    /* LEGAL BLOCK */
    .legal-block {
      font-size: var(--font-sm);
      padding: 14px 18px;
    }

    .legal-block ul { font-size: var(--font-sm); }

    .footer {
      margin-top: 18px;
      text-align: right;
      font-size: var(--font-sm);
      color: var(--text-soft);
    }

    .stamp {
      font-size: var(--font-xs);
      padding: 10px 16px;
    }

  </style>
</head>

<body>
